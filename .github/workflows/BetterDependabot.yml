name: BetterDependabot

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install (sync lockfile state)
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Update originGUI dependencies
        working-directory: originGUI
        run: pnpm update

      - name: Update typings dependencies
        working-directory: typings
        run: pnpm update

      - name: Update extension dependencies
        working-directory: extension
        run: pnpm update

      - name: Update extension/firefox dependencies
        working-directory: extension/firefox
        run: pnpm update

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "chore: update dependencies"
          git push origin HEAD:${{ github.ref }}
